name: Go Multi-Platform Build & Auto Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: launcher/go.mod

      - name: Run unit tests
        working-directory: launcher
        run: |
          # Run tests excluding integration tests that require Docker
          go test -short ./...

      - name: Build multi-platform binaries
        working-directory: launcher
        run: |
          make cross

      - name: Package binaries
        working-directory: launcher/dist
        run: |
          # Package each binary for easy downloading
          for file in *; do
            if [[ -f "$file" ]]; then
              if [[ "$file" == *.exe ]]; then
                zip "${file%.exe}.zip" "$file"
                rm "$file"
              else
                tar -czf "$file.tar.gz" "$file"
                rm "$file"
              fi
            fi
          done
          ls -la

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: egovframe-launcher-binaries
          path: launcher/dist/*
          retention-days: 5

  release:
    name: Auto Tag & Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Changelog
        id: get_version
        run: |
          # Extract the latest version from CHANGELOG.md (e.g. [1.0.0])
          VERSION=$(grep -oE '## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$VERSION" ]; then
            echo "Error: Version not found in CHANGELOG.md"
            exit 1
          fi
          echo "VERSION=v$VERSION" >> $GITHUB_ENV
          echo "Detected version: v$VERSION"

      - name: Create and push tag if not exists
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if tag already exists in remote
          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.VERSION }} already exists. Skipping tag creation."
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "Creating tag ${{ env.VERSION }}"
            git tag "${{ env.VERSION }}"
            git push origin "${{ env.VERSION }}"
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: egovframe-launcher-binaries
          path: dist

      - name: Extract release notes for this version only
        run: |
          # Take only the latest "## [x.y.z]" section of CHANGELOG.md
          awk '/^## \[/{ if (found) exit; found=1 } found' CHANGELOG.md > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: dist/*
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

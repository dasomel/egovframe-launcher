name: Go Multi-Platform Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: launcher/go.mod

      - name: Run unit tests
        working-directory: launcher
        run: |
          # Run tests excluding integration tests that require Docker
          go test -short ./...

      - name: Build multi-platform binaries
        working-directory: launcher
        run: |
          make cross

      - name: Package binaries
        working-directory: launcher/dist
        run: |
          # Package each binary for easy downloading
          for file in *; do
            if [[ -f "$file" ]]; then
              if [[ "$file" == *.exe ]]; then
                zip "${file%.exe}.zip" "$file"
                rm "$file"
              else
                tar -czf "$file.tar.gz" "$file"
                rm "$file"
              fi
            fi
          done
          ls -la

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: egovframe-launcher-binaries
          path: launcher/dist/*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: egovframe-launcher-binaries
          path: dist

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
